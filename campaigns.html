<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Companion – Campaigns</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>

  <nav id="main-nav"></nav>

  <main>
    <h1>🗺 Campaigns</h1>
    <p class="subtitle">Manage your campaigns. Log sessions, keep world notes, and never lose the thread.</p>

    <!-- Campaign selector -->
    <div class="card" id="campaign-selector-card">
      <h3>Your Campaigns</h3>
      <div id="campaign-selector-loading"><p class="loading-state"><span class="spinner"></span> Loading…</p></div>
      <div id="campaign-selector" style="display:none;">

        <!-- Select + action buttons -->
        <div class="row-actions" style="margin-bottom:12px;">
          <select id="campaign-select" onchange="switchCampaign()" style="flex:1; min-width:180px; margin:0;">
            <option value="">— Select a campaign —</option>
          </select>
          <button onclick="showCreateCampaign()" style="white-space:nowrap;">+ New Campaign</button>
          <button class="danger" onclick="deleteCampaign()"
            id="delete-campaign-btn" style="white-space:nowrap; display:none;">🗑 Delete</button>
        </div>

        <!-- Inline new-campaign form (hidden until + New Campaign is clicked) -->
        <div id="new-campaign-row" style="display:none; margin-bottom:12px;">
          <label>New Campaign Name</label>
          <div class="row-actions">
            <input type="text" id="new-campaign-name"
              placeholder="e.g. Curse of Strahd"
              style="flex:1; margin:0;"
              onkeydown="if(event.key==='Enter') confirmCreateCampaign(); if(event.key==='Escape') cancelCreateCampaign();" />
            <button onclick="confirmCreateCampaign()" style="white-space:nowrap;">Create</button>
            <button class="secondary" onclick="cancelCreateCampaign()" style="white-space:nowrap;">Cancel</button>
          </div>
        </div>

        <!-- Rename row (shown when a campaign is selected) -->
        <div id="campaign-rename-row" style="display:none; margin-bottom:4px;">
          <label>Campaign Name</label>
          <div class="row-actions">
            <input type="text" id="campaign-name-input" style="flex:1; margin:0;" />
            <button onclick="renameCampaign()" style="white-space:nowrap;">Rename</button>
          </div>
        </div>

      </div>
    </div>

    <!-- Campaign detail (shown when a campaign is selected) -->
    <div id="campaign-detail" style="display:none;">

      <!-- World Notes -->
      <div class="card">
        <h3>🌍 World Notes</h3>
        <textarea id="world-notes"
          placeholder="Lore, factions, geography, recurring themes — anything the world needs you to remember."
          style="min-height:160px;" oninput="markWorldDirty()"></textarea>
        <div class="row-actions">
          <button id="world-save-btn" onclick="saveWorldNotes()">💾 Save Notes</button>
          <span id="world-save-status" class="save-status"></span>
        </div>
      </div>

      <!-- Session log -->
      <h2>📜 Session Log</h2>
      <button onclick="addSession()" style="margin-bottom:16px;">+ Log New Session</button>

      <div id="session-list">
        <p class="loading-state"><span class="spinner"></span> Loading sessions…</p>
      </div>

      <div class="row-actions" style="margin-top:12px;">
        <button id="sessions-save-btn" onclick="saveSessions()" style="display:none;">💾 Save Sessions</button>
        <span id="sessions-save-status" class="save-status"></span>
      </div>

    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'campaigns.html';</script>
  <script src="js/lib/supabase.js"></script>
  <script src="js/lib/auth.js"></script>
  <script src="js/lib/app.js"></script>
  <script src="js/pages/campaigns.js"></script>
</body>
</html>
