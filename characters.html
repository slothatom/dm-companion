<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn-uicons.flaticon.com https://fonts.googleapis.com; font-src https://cdn-uicons.flaticon.com https://fonts.gstatic.com; img-src 'self' data: https://www.transparenttextures.com https://*.googleusercontent.com https://avatars.githubusercontent.com; connect-src 'self' https://*.supabase.co https://api.open5e.com https://www.dnd5eapi.co;" />
  <title>DM Companion – Characters</title>
  <meta name="description" content="Manage NPCs and creatures for your D&amp;D campaigns." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to content</a>

  <nav id="main-nav" aria-label="Main navigation"></nav>

  <main id="main-content">
    <h1><i class="fi fi-rr-skull"></i> Characters</h1>
    <p class="subtitle">Track your NPCs and creatures. Never forget a stat mid-combat again.</p>

    <div class="notes-campaign-bar" id="char-campaign-bar" style="display:none;">
      <div class="campaign-select-wrap">
        <label for="char-campaign-select">Campaign</label>
        <select id="char-campaign-select" onchange="filterByCampaign()">
          <option value=""><i class="fi fi-rr-world"></i> All Characters</option>
        </select>
      </div>
    </div>

    <div class="gen-type-tabs" style="margin-bottom:20px;">
      <button class="gen-tab active-gen-tab" id="tab-npc" onclick="setCharTab('npc', this)"><i class="fi fi-rr-user-speaking"></i> NPCs</button>
      <button class="gen-tab" id="tab-creature" onclick="setCharTab('creature', this)"><i class="fi fi-rr-dragon"></i> Creatures</button>
    </div>

    <div id="panel-npc">
      <div id="npc-list"><p class="loading-state"><span class="spinner"></span> Loading…</p></div>
      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:8px;">
        <button onclick="addNPC()"><i class="fi fi-rr-plus"></i> Add NPC</button>
        <a href="npc-generator.html" class="btn-link"><i class="fi fi-rr-magic-wand"></i> Generate NPC</a>
      </div>
    </div>

    <div id="panel-creature" style="display:none;">
      <div id="creature-list"><p class="loading-state"><span class="spinner"></span> Loading…</p></div>
      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:8px;">
        <button onclick="addCreature()"><i class="fi fi-rr-plus"></i> Add Creature</button>
        <a href="npc-generator.html" class="btn-link"><i class="fi fi-rr-magic-wand"></i> Generate Creature</a>
      </div>
    </div>

    <br />
    <button id="save-btn" onclick="saveCharacters()"><i class="fi fi-rr-disk"></i> Save All</button>
    <span id="save-status" class="save-status"></span>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'characters.html';</script>
  <script src="js/lib/supabase.js"></script>
  <script src="js/lib/auth.js"></script>
  <script src="js/lib/app.js"></script>
  <script src="js/pages/characters.js"></script>
</body>
</html>
