<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Companion – Characters</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>

  <nav id="main-nav"></nav>

  <main>
    <h1>🐉 Characters</h1>
    <p class="subtitle">Track your NPCs and creatures. Never forget a stat mid-combat again.</p>

    <div class="notes-campaign-bar" id="char-campaign-bar" style="display:none;">
      <div class="campaign-select-wrap">
        <label for="char-campaign-select">Campaign</label>
        <select id="char-campaign-select" onchange="filterByCampaign()">
          <option value="">🌐 All Characters</option>
        </select>
      </div>
    </div>

    <div class="gen-type-tabs" style="margin-bottom:20px;">
      <button class="gen-tab active-gen-tab" id="tab-npc" onclick="setCharTab('npc', this)">🗣 NPCs</button>
      <button class="gen-tab" id="tab-creature" onclick="setCharTab('creature', this)">🐉 Creatures</button>
    </div>

    <div id="panel-npc">
      <div id="npc-list"><p class="loading-state"><span class="spinner"></span> Loading…</p></div>
      <button onclick="addNPC()">+ Add NPC</button>
    </div>

    <div id="panel-creature" style="display:none;">
      <div id="creature-list"><p class="loading-state"><span class="spinner"></span> Loading…</p></div>
      <button onclick="addCreature()">+ Add Creature</button>
    </div>

    <br />
    <button id="save-btn" onclick="saveCharacters()">💾 Save All</button>
    <span id="save-status" class="save-status"></span>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'characters.html';</script>
  <script src="js/lib/supabase.js"></script>
  <script src="js/lib/auth.js"></script>
  <script src="js/lib/app.js"></script>
  <script src="js/pages/characters.js"></script>
</body>
</html>
