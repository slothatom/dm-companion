<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Companion – Dice Roller</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>

  <nav id="main-nav"></nav>

  <main>
    <h1><i class="fi fi-rr-dice-d20"></i> Dice Roller</h1>
    <p class="subtitle">May your rolls be ever in your favour.</p>

    <div class="dice-grid">
      <button class="die-btn" onclick="roll(4)"><span class="die-icon"><i class="fi fi-rr-dice-d4"></i></span><span>d4</span></button>
      <button class="die-btn" onclick="roll(6)"><span class="die-icon"><i class="fi fi-rr-dice-d6"></i></span><span>d6</span></button>
      <button class="die-btn" onclick="roll(8)"><span class="die-icon"><i class="fi fi-rr-dice-d8"></i></span><span>d8</span></button>
      <button class="die-btn" onclick="roll(10)"><span class="die-icon"><i class="fi fi-rr-dice-d10"></i></span><span>d10</span></button>
      <button class="die-btn" onclick="roll(12)"><span class="die-icon"><i class="fi fi-rr-dice-d12"></i></span><span>d12</span></button>
      <button class="die-btn" onclick="roll(20)"><span class="die-icon"><i class="fi fi-rr-dice-d20"></i></span><span>d20</span></button>
      <button class="die-btn" onclick="roll(100)"><span class="die-icon"><i class="fi fi-rr-dice"></i></span><span>d100</span></button>
    </div>

    <div style="display:flex; gap:10px; justify-content:center; margin: 4px 0 20px;">
      <button class="secondary" onclick="rollAdvantage()"><i class="fi fi-rr-arrow-up"></i> Advantage</button>
      <button class="secondary" onclick="rollDisadvantage()"><i class="fi fi-rr-arrow-down"></i> Disadvantage</button>
    </div>

    <div class="card">
      <h3>Expression Roll</h3>
      <p style="color:var(--text-muted); font-size:14px; margin-bottom:12px;">
        Type any dice expression - e.g. <code style="background:var(--surface2); padding:1px 6px; border-radius:4px; font-size:13px;">2d6+3</code> or <code style="background:var(--surface2); padding:1px 6px; border-radius:4px; font-size:13px;">d20-1</code>
      </p>
      <div style="display:flex; gap:8px; align-items:center;">
        <input type="text" id="dice-expr" placeholder="e.g. 2d6+3"
          style="margin:0; flex:1;"
          onkeydown="if(event.key==='Enter') rollExpression()" />
        <button onclick="rollExpression()" style="white-space:nowrap;"><i class="fi fi-rr-dice-d20"></i> Roll</button>
      </div>
    </div>

    <div class="card">
      <h3>Custom Roll</h3>
      <div class="stat-grid">
        <div>
          <label>Number of dice</label>
          <input type="number" id="num-dice" value="1" min="1" max="20" />
        </div>
        <div>
          <label>Die type</label>
          <select id="die-type">
            <option value="4">d4</option>
            <option value="6">d6</option>
            <option value="8">d8</option>
            <option value="10">d10</option>
            <option value="12">d12</option>
            <option value="20" selected>d20</option>
            <option value="100">d100</option>
          </select>
        </div>
        <div>
          <label>Modifier (+ or -)</label>
          <input type="number" id="modifier" value="0" />
        </div>
      </div>
      <button onclick="rollCustom()"><i class="fi fi-rr-dice-d20"></i> Roll</button>
    </div>

    <!-- Visual Dice Result -->
    <div class="dice-result-area">
      <div class="dice-visual" id="dice-visual">
        <div class="dice-visual-shape">
          <i class="fi fi-rr-dice-d20" id="dice-idle-icon"></i>
          <span class="dice-number" id="dice-number" style="display:none;"></span>
        </div>
      </div>
      <div class="roll-result-text" id="roll-label">Click a die to roll</div>
    </div>

    <h2><i class="fi fi-rr-dice-d20"></i> Roll History</h2>
    <div class="roll-history" id="roll-history">
      <span style="color:#5a4a30; font-style:italic;">No rolls yet.</span>
    </div>
    <br />
    <button class="secondary" onclick="clearHistory()">Clear History</button>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'dice.html';</script>
  <script src="js/lib/supabase.js"></script>
  <script src="js/lib/auth.js"></script>
  <script src="js/lib/app.js"></script>
  <script src="js/pages/dice.js"></script>
</body>
</html>
