<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Companion – Dice Roller</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>

  <nav id="main-nav"></nav>

  <main>
    <h1>🎲 Dice Roller</h1>
    <p class="subtitle">May your rolls be ever in your favour.</p>

    <div class="dice-grid">
      <button class="die-btn" onclick="roll(4)"><span class="die-icon">🔺</span><span>d4</span></button>
      <button class="die-btn" onclick="roll(6)"><span class="die-icon">🎲</span><span>d6</span></button>
      <button class="die-btn" onclick="roll(8)"><span class="die-icon">💎</span><span>d8</span></button>
      <button class="die-btn" onclick="roll(10)"><span class="die-icon">🔷</span><span>d10</span></button>
      <button class="die-btn" onclick="roll(12)"><span class="die-icon">⬡</span><span>d12</span></button>
      <button class="die-btn" onclick="roll(20)"><span class="die-icon">⭐</span><span>d20</span></button>
      <button class="die-btn" onclick="roll(100)"><span class="die-icon">💯</span><span>d100</span></button>
    </div>

    <div style="display:flex; gap:10px; justify-content:center; margin: 4px 0 20px;">
      <button class="secondary" onclick="rollAdvantage()">⬆️ Advantage</button>
      <button class="secondary" onclick="rollDisadvantage()">⬇️ Disadvantage</button>
    </div>

    <div class="card">
      <h3>Expression Roll</h3>
      <p style="color:var(--text-muted); font-size:14px; margin-bottom:12px;">
        Type any dice expression — e.g. <code style="background:var(--surface2); padding:1px 6px; border-radius:4px; font-size:13px;">2d6+3</code> or <code style="background:var(--surface2); padding:1px 6px; border-radius:4px; font-size:13px;">d20-1</code>
      </p>
      <div style="display:flex; gap:8px; align-items:center;">
        <input type="text" id="dice-expr" placeholder="e.g. 2d6+3"
          style="margin:0; flex:1;"
          onkeydown="if(event.key==='Enter') rollExpression()" />
        <button onclick="rollExpression()" style="white-space:nowrap;">🎲 Roll</button>
      </div>
    </div>

    <div class="card">
      <h3>Custom Roll</h3>
      <div class="stat-grid">
        <div>
          <label>Number of dice</label>
          <input type="number" id="num-dice" value="1" min="1" max="20" />
        </div>
        <div>
          <label>Die type</label>
          <select id="die-type">
            <option value="4">d4</option>
            <option value="6">d6</option>
            <option value="8">d8</option>
            <option value="10">d10</option>
            <option value="12">d12</option>
            <option value="20" selected>d20</option>
            <option value="100">d100</option>
          </select>
        </div>
        <div>
          <label>Modifier (+ or -)</label>
          <input type="number" id="modifier" value="0" />
        </div>
      </div>
      <button onclick="rollCustom()">🎲 Roll</button>
    </div>

    <div style="text-align:center; margin: 28px 0 8px;">
      <div class="roll-result" id="roll-result">—</div>
      <div class="roll-label" id="roll-label">Click a die to roll</div>
    </div>

    <h2>Roll History</h2>
    <div class="roll-history" id="roll-history">
      <span style="color:#5a4a30; font-style:italic;">No rolls yet.</span>
    </div>
    <br />
    <button class="secondary" onclick="clearHistory()">Clear History</button>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'dice.html';</script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>

    let history = [];

    (async function () {
      const user = await requireAuth();
      if (!user) return;
      renderNav(user);
    })();

    function roll(sides) {
      const result = Math.floor(Math.random() * sides) + 1;
      displayResult(result, 'd' + sides, [result], 0);
      addToHistory('d' + sides, result, [result], 0);
    }

    function rollCustom() {
      const num      = parseInt(document.getElementById('num-dice').value)  || 1;
      const sides    = parseInt(document.getElementById('die-type').value)  || 20;
      const modifier = parseInt(document.getElementById('modifier').value)  || 0;

      const rolls = [];
      for (var i = 0; i < num; i++) {
        rolls.push(Math.floor(Math.random() * sides) + 1);
      }

      const total = rolls.reduce(function (a, b) { return a + b; }, 0) + modifier;
      const label = num + 'd' + sides + (modifier !== 0 ? (modifier > 0 ? '+' : '') + modifier : '');
      displayResult(total, label, rolls, modifier);
      addToHistory(label, total, rolls, modifier);
    }

    function rollExpression() {
      const raw  = (document.getElementById('dice-expr').value || '').trim();
      if (!raw) return;
      const expr = raw.replace(/\s/g, '').toLowerCase();
      const match = expr.match(/^(\d*)d(\d+)([+-]\d+)?$/);
      if (!match) { showToast('Invalid — try "2d6+3" or "d20"', 'error'); return; }
      const num      = parseInt(match[1]) || 1;
      const sides    = parseInt(match[2]);
      const modifier = parseInt(match[3]) || 0;
      if (num < 1 || num > 20)      { showToast('Use between 1 and 20 dice.', 'error'); return; }
      if (sides < 2 || sides > 1000) { showToast('Die size must be 2–1000.', 'error'); return; }
      const rolls = [];
      for (var i = 0; i < num; i++) rolls.push(Math.floor(Math.random() * sides) + 1);
      const total = rolls.reduce(function (a, b) { return a + b; }, 0) + modifier;
      const label = num + 'd' + sides + (modifier !== 0 ? (modifier > 0 ? '+' : '') + modifier : '');
      displayResult(total, label, rolls, modifier);
      addToHistory(label, total, rolls, modifier);
    }

    function rollAdvantage() {
      const r1 = Math.floor(Math.random() * 20) + 1;
      const r2 = Math.floor(Math.random() * 20) + 1;
      const total = Math.max(r1, r2);
      displayResult(total, 'd20 adv', [r1, r2], 0);
      addToHistory('d20 adv', total, [r1, r2], 0);
    }

    function rollDisadvantage() {
      const r1 = Math.floor(Math.random() * 20) + 1;
      const r2 = Math.floor(Math.random() * 20) + 1;
      const total = Math.min(r1, r2);
      displayResult(total, 'd20 dis', [r1, r2], 0);
      addToHistory('d20 dis', total, [r1, r2], 0);
    }

    function displayResult(total, label, rolls, modifier) {
      const resultEl = document.getElementById('roll-result');
      const labelEl  = document.getElementById('roll-label');

      resultEl.style.opacity = '0';
      setTimeout(function () {
        resultEl.textContent = total;
        resultEl.style.opacity = '1';
      }, 100);

      var detail = label;
      if (rolls.length > 1) detail += ' → [' + rolls.join(', ') + ']';
      if (modifier !== 0)   detail += ' ' + (modifier >= 0 ? '+' : '') + modifier;
      labelEl.textContent = detail;

      // Colour: nat-20 green, nat-1 red, else gold; applies to d20 and adv/dis
      const isD20 = (label === 'd20' || label === 'd20 adv' || label === 'd20 dis');
      if (isD20) {
        if (total === 20)     resultEl.style.color = '#6aaa6a';
        else if (total === 1) resultEl.style.color = '#aa4040';
        else                  resultEl.style.color = '#c9a84c';
      } else {
        resultEl.style.color = '#c9a84c';
      }
    }

    function addToHistory(label, total, rolls, modifier) {
      history.unshift({ label, total, rolls, modifier });
      if (history.length > 20) history.pop();
      renderHistory();
    }

    function renderHistory() {
      const container = document.getElementById('roll-history');
      if (history.length === 0) {
        container.innerHTML = '<span style="color:#5a4a30; font-style:italic;">No rolls yet.</span>';
        return;
      }
      container.innerHTML = history.map(function (h) {
        return `<span class="history-chip">${h.label}: <strong>${h.total}</strong></span>`;
      }).join('');
    }

    function clearHistory() {
      history = [];
      renderHistory();
      document.getElementById('roll-result').textContent = '—';
      document.getElementById('roll-label').textContent  = 'Click a die to roll';
    }

  </script>
</body>
</html>
