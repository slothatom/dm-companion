<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Companion – Session Notes</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>

  <nav id="main-nav"></nav>

  <main>
    <h1>📜 Session Notes</h1>
    <p class="subtitle">Plan your session. Tie notes to a campaign or keep them standalone.</p>

    <div id="notes-loading" class="loading-state">
      <span class="spinner"></span> Loading your notes…
    </div>

    <div id="notes-form" style="display:none;">

      <!-- Campaign selector + Reset / Delete -->
      <div class="notes-campaign-bar">
        <div class="campaign-select-wrap">
          <label for="notes-campaign">Campaign</label>
          <select id="notes-campaign" onchange="switchCampaign()">
            <option value="">📋 General Notes</option>
          </select>
        </div>
        <div class="row-actions">
          <button class="secondary" style="padding:8px 16px; font-size:12px;" onclick="resetNotes()">↺ Reset</button>
          <button class="danger"    style="padding:8px 16px; font-size:12px;" onclick="deleteNotes()">🗑 Delete</button>
        </div>
      </div>

      <label for="session-title">Session Title</label>
      <input type="text" id="session-title" placeholder="e.g. The Curse of Strahd – Session 4"
        oninput="markDirty()" />

      <h2>📖 The Story</h2>
      <label for="story">Overview &amp; plot hooks</label>
      <textarea id="story" oninput="markDirty()"
        placeholder="What's the main story? What are the key plot points? What do the players need to find out or do?"
      ></textarea>

      <h2>📍 Key Locations</h2>
      <label for="locations">Places the players will visit</label>
      <textarea id="locations" oninput="markDirty()"
        placeholder="Describe each location briefly. What's there? Any secrets? Any traps?"
        style="min-height: 140px;"
      ></textarea>

      <h2>📝 DM Notes</h2>
      <label for="dm-notes">Your private notes, reminders, and ideas</label>
      <textarea id="dm-notes" oninput="markDirty()"
        placeholder="Anything you want to remember: pacing tips, improvised NPC names, contingencies if players go off-script..."
        style="min-height: 160px;"
      ></textarea>

      <button id="save-btn" onclick="saveNotes()">💾 Save Notes</button>
      <span id="save-status" class="save-status"></span>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'index.html';</script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>

    let currentUserId    = null;
    let activeCampaignId = null;   // null = General Notes
    let currentNoteId    = null;   // DB row id of loaded note
    let isDirty          = false;
    let autosaveTimer    = null;

    setupDirtyGuard(function () { return isDirty; });

    (async function () {
      const user = await requireAuth();
      if (!user) return;
      currentUserId = user.id;
      renderNav(user);
      await loadCampaigns();
      await loadNotesForCampaign();
    })();

    // ── Campaign selector ─────────────────────────────────────

    async function loadCampaigns() {
      const { data } = await db
        .from('campaigns')
        .select('id, name')
        .eq('user_id', currentUserId)
        .order('created_at');

      const sel = document.getElementById('notes-campaign');
      // Keep the "General Notes" option and append campaign options
      (data || []).forEach(function (c) {
        const opt = document.createElement('option');
        opt.value       = c.id;
        opt.textContent = '🗺 ' + c.name;
        sel.appendChild(opt);
      });

      // Restore last-used campaign for this user
      const stored = localStorage.getItem('notes-campaign-' + currentUserId);
      if (stored) {
        // Only restore if that option actually exists in the list
        const exists = Array.from(sel.options).some(function (o) { return o.value === stored; });
        if (exists) {
          sel.value        = stored;
          activeCampaignId = stored || null;
        }
      }
    }

    function switchCampaign() {
      const val    = document.getElementById('notes-campaign').value;
      const newId  = val === '' ? null : val;

      function doSwitch() {
        activeCampaignId = newId;
        currentNoteId    = null;
        localStorage.setItem('notes-campaign-' + currentUserId, val);
        loadNotesForCampaign();
      }

      if (isDirty) {
        // Save current note first, then switch
        saveNotes().then(doSwitch);
      } else {
        doSwitch();
      }
    }

    // ── Load / Save ───────────────────────────────────────────

    async function loadNotesForCampaign() {
      document.getElementById('notes-loading').style.display = 'flex';
      document.getElementById('notes-form').style.display    = 'none';

      let query = db.from('session_notes').select('*').eq('user_id', currentUserId);
      if (activeCampaignId === null) {
        query = query.is('campaign_id', null);
      } else {
        query = query.eq('campaign_id', activeCampaignId);
      }
      const { data, error } = await query.maybeSingle();

      document.getElementById('notes-loading').style.display = 'none';
      document.getElementById('notes-form').style.display    = 'block';

      if (error) { showToast('Could not load notes: ' + error.message, 'error'); return; }

      if (data) {
        currentNoteId = data.id;
        document.getElementById('session-title').value = data.title     || '';
        document.getElementById('story').value         = data.story     || '';
        document.getElementById('locations').value     = data.locations || '';
        document.getElementById('dm-notes').value      = data.dm_notes  || '';
      } else {
        currentNoteId = null;
        document.getElementById('session-title').value = '';
        document.getElementById('story').value         = '';
        document.getElementById('locations').value     = '';
        document.getElementById('dm-notes').value      = '';
      }
      isDirty = false;
    }

    function markDirty() {
      isDirty = true;
      markUnsaved();
      clearTimeout(autosaveTimer);
      autosaveTimer = setTimeout(saveNotes, 2500);
    }

    async function saveNotes() {
      clearTimeout(autosaveTimer);
      const btn = document.getElementById('save-btn');
      setButtonLoading(btn, true);

      const payload = {
        user_id:     currentUserId,
        campaign_id: activeCampaignId,
        title:       document.getElementById('session-title').value,
        story:       document.getElementById('story').value,
        locations:   document.getElementById('locations').value,
        dm_notes:    document.getElementById('dm-notes').value,
        updated_at:  new Date().toISOString()
      };

      let error;
      if (currentNoteId) {
        const result = await db.from('session_notes').update(payload).eq('id', currentNoteId);
        error = result.error;
      } else {
        const result = await db.from('session_notes').insert(payload).select('id').single();
        error = result.error;
        if (!error && result.data) currentNoteId = result.data.id;
      }

      setButtonLoading(btn, false);

      if (error) {
        showToast('Save failed: ' + error.message, 'error');
      } else {
        isDirty = false;
        showSaved();
      }
    }

    // ── Reset / Delete ────────────────────────────────────────

    function resetNotes() {
      showConfirm({
        title:       'Reset Notes',
        message:     'Clear all content in this note? The blank note will be saved immediately.',
        confirmText: 'Reset',
        danger:      true,
        onConfirm:   function () {
          document.getElementById('session-title').value = '';
          document.getElementById('story').value         = '';
          document.getElementById('locations').value     = '';
          document.getElementById('dm-notes').value      = '';
          isDirty = true;
          saveNotes();
        },
      });
    }

    function deleteNotes() {
      if (!currentNoteId) { showToast('No saved note to delete.', 'info'); return; }
      showConfirm({
        title:       'Delete Notes',
        message:     'Permanently delete this note? This cannot be undone.',
        confirmText: 'Delete',
        danger:      true,
        onConfirm:   async function () {
          const { error } = await db.from('session_notes').delete().eq('id', currentNoteId);
          if (error) { showToast('Delete failed: ' + error.message, 'error'); return; }
          currentNoteId = null;
          isDirty       = false;
          document.getElementById('session-title').value = '';
          document.getElementById('story').value         = '';
          document.getElementById('locations').value     = '';
          document.getElementById('dm-notes').value      = '';
          showToast('Notes deleted.', 'success');
        },
      });
    }

  </script>
</body>
</html>
