<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Companion – Session Notes</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>

  <nav id="main-nav"></nav>

  <main>
    <h1>📜 Session Notes</h1>
    <p class="subtitle">Plan your one-shot. Write everything you need to run a great game.</p>

    <div id="notes-loading" class="loading-state">
      <span class="spinner"></span> Loading your notes…
    </div>

    <div id="notes-form" style="display:none;">

      <label for="session-title">Session Title</label>
      <input type="text" id="session-title" placeholder="e.g. The Curse of Strahd – One Shot"
        oninput="markDirty()" />

      <h2>The Story</h2>
      <label for="story">Overview & plot hooks</label>
      <textarea id="story" oninput="markDirty()"
        placeholder="What's the main story? What are the key plot points? What do the players need to find out or do?"
      ></textarea>

      <h2>Key Locations</h2>
      <label for="locations">Places the players will visit</label>
      <textarea id="locations" oninput="markDirty()"
        placeholder="Describe each location briefly. What's there? Any secrets? Any traps?"
        style="min-height: 140px;"
      ></textarea>

      <h2>DM Notes</h2>
      <label for="dm-notes">Your private notes, reminders, and ideas</label>
      <textarea id="dm-notes" oninput="markDirty()"
        placeholder="Anything you want to remember: pacing tips, improvised NPC names, contingencies if players go off-script..."
        style="min-height: 160px;"
      ></textarea>

      <button id="save-btn" onclick="saveNotes()">💾 Save Notes</button>
      <span id="save-status"></span>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'index.html';</script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>

    let currentUserId  = null;
    let isDirty        = false;
    let autosaveTimer  = null;

    window.addEventListener('beforeunload', function (e) {
      if (isDirty) { e.preventDefault(); e.returnValue = ''; }
    });

    (async function () {
      const user = await requireAuth();
      if (!user) return;
      currentUserId = user.id;
      renderNav(user);
      await loadNotes();
    })();

    async function loadNotes() {
      const { data, error } = await db
        .from('session_notes')
        .select('*')
        .eq('user_id', currentUserId)
        .maybeSingle();

      document.getElementById('notes-loading').style.display = 'none';
      document.getElementById('notes-form').style.display    = 'block';

      if (error) { showToast('Could not load notes: ' + error.message, 'error'); return; }

      if (data) {
        document.getElementById('session-title').value = data.title     || '';
        document.getElementById('story').value         = data.story     || '';
        document.getElementById('locations').value     = data.locations || '';
        document.getElementById('dm-notes').value      = data.dm_notes  || '';
      }
      isDirty = false;
    }

    function markDirty() {
      isDirty = true;
      markUnsaved();
      clearTimeout(autosaveTimer);
      autosaveTimer = setTimeout(saveNotes, 2500);
    }

    async function saveNotes() {
      clearTimeout(autosaveTimer);
      const btn = document.getElementById('save-btn');
      setButtonLoading(btn, true);

      const { error } = await db
        .from('session_notes')
        .upsert({
          user_id:    currentUserId,
          title:      document.getElementById('session-title').value,
          story:      document.getElementById('story').value,
          locations:  document.getElementById('locations').value,
          dm_notes:   document.getElementById('dm-notes').value,
          updated_at: new Date().toISOString()
        }, { onConflict: 'user_id' });

      setButtonLoading(btn, false);

      if (error) {
        showToast('Save failed: ' + error.message, 'error');
      } else {
        isDirty = false;
        showSaved();
      }
    }

  </script>
</body>
</html>
