<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Companion – Initiative Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>

  <nav id="main-nav"></nav>

  <main>
    <h1>⚔️ Initiative Tracker</h1>
    <p class="subtitle">Track combat turn order. Never lose your place mid-battle again.</p>

    <!-- Add combatant form -->
    <div class="card">
      <h3>Add Combatant</h3>
      <div class="stat-grid">
        <div>
          <label>Name</label>
          <input type="text" id="new-name" placeholder="e.g. Goblin Chief" />
        </div>
        <div>
          <label>Initiative</label>
          <input type="number" id="new-init" placeholder="e.g. 14" />
        </div>
        <div>
          <label>HP (optional)</label>
          <input type="number" id="new-hp" placeholder="e.g. 30" />
        </div>
      </div>
      <div class="stat-grid-2" style="margin-bottom:16px;">
        <div>
          <label>Type</label>
          <select id="new-type">
            <option value="player">🧙 Player</option>
            <option value="npc">🗣 NPC</option>
            <option value="creature">🐉 Creature</option>
          </select>
        </div>
        <div style="display:flex; align-items:flex-end; padding-bottom:16px;">
          <button onclick="addCombatant()" style="width:100%;">+ Add</button>
        </div>
      </div>
    </div>

    <div style="margin-bottom: 20px; display:flex; gap:10px; flex-wrap:wrap;">
      <button class="secondary" onclick="importPlayers()">📥 Import Players</button>
      <button class="secondary" onclick="importCreatures()">📥 Import Creatures</button>
    </div>

    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:24px;">
      <button onclick="sortByInitiative()">⬆️ Sort by Initiative</button>
      <button class="gold" onclick="nextTurn()">▶ Next Turn</button>
      <button class="secondary" onclick="resetTurn()">↩ Reset Round</button>
      <button class="danger" onclick="clearAll()">🗑 Clear All</button>
    </div>

    <div style="font-size:18px; color:#a89060; margin-bottom:16px;">
      Round: <strong id="round-counter" style="color:#c9a84c;">1</strong>
      &nbsp;|&nbsp;
      Turn: <strong id="turn-counter" style="color:#c9a84c;">—</strong>
    </div>

    <div class="initiative-list" id="init-list">
      <p class="empty-state">No combatants yet. Add some above or import your players!</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'initiative.html';</script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>

    let combatants    = [];
    let currentTurn   = 0;
    let round         = 1;
    let currentUserId = null;

    (async function () {
      const user = await requireAuth();
      if (!user) return;
      currentUserId = user.id;
      renderNav(user);
      renderList();
    })();

    function addCombatant() {
      const name = document.getElementById('new-name').value.trim();
      const init = parseInt(document.getElementById('new-init').value) || 0;
      const hp   = document.getElementById('new-hp').value;
      const type = document.getElementById('new-type').value;

      if (!name) { alert('Please enter a name.'); return; }
      combatants.push({ name, init, hp: hp || '—', type, maxHp: hp || '—' });

      document.getElementById('new-name').value = '';
      document.getElementById('new-init').value = '';
      document.getElementById('new-hp').value   = '';
      renderList();
    }

    async function importPlayers() {
      const { data, error } = await db
        .from('players')
        .select('*')
        .eq('user_id', currentUserId)
        .order('created_at');

      if (error || !data || data.length === 0) {
        alert('No players found. Go to the Players page and add your party first!');
        return;
      }
      data.forEach(function (p) {
        combatants.push({
          name:  p.char_name || p.player_name || 'Unknown',
          init:  0,
          hp:    p.hp || '—',
          maxHp: p.hp || '—',
          type:  'player'
        });
      });
      renderList();
    }

    async function importCreatures() {
      const { data, error } = await db
        .from('creatures')
        .select('*')
        .eq('user_id', currentUserId)
        .order('created_at');

      if (error || !data || data.length === 0) {
        alert('No creatures found. Go to the Characters page and add some first!');
        return;
      }
      data.forEach(function (c) {
        combatants.push({
          name:  c.name || 'Unknown Creature',
          init:  0,
          hp:    c.hp || '—',
          maxHp: c.hp || '—',
          type:  'creature'
        });
      });
      renderList();
    }

    function sortByInitiative() {
      combatants.sort((a, b) => b.init - a.init);
      currentTurn = 0;
      renderList();
    }

    function nextTurn() {
      if (combatants.length === 0) return;
      currentTurn++;
      if (currentTurn >= combatants.length) {
        currentTurn = 0;
        round++;
        document.getElementById('round-counter').textContent = round;
      }
      renderList();
    }

    function resetTurn() {
      currentTurn = 0;
      round = 1;
      document.getElementById('round-counter').textContent = 1;
      renderList();
    }

    function clearAll() {
      if (!confirm('Clear all combatants?')) return;
      combatants  = [];
      currentTurn = 0;
      round       = 1;
      document.getElementById('round-counter').textContent = 1;
      renderList();
    }

    function removeCombatant(index) {
      combatants.splice(index, 1);
      if (currentTurn >= combatants.length) currentTurn = 0;
      renderList();
    }

    function updateHp(index, value) {
      combatants[index].hp = value;
    }

    function renderList() {
      const container = document.getElementById('init-list');
      if (combatants.length === 0) {
        container.innerHTML = '<p class="empty-state">No combatants yet. Add some above or import your players!</p>';
        document.getElementById('turn-counter').textContent = '—';
        return;
      }

      document.getElementById('turn-counter').textContent =
        combatants[currentTurn] ? combatants[currentTurn].name : '—';

      const typeIcons = { player: '🧙', npc: '🗣', creature: '🐉' };

      container.innerHTML = combatants.map(function (c, i) {
        const isActive = i === currentTurn;
        return `
          <div class="init-row ${isActive ? 'active-turn' : ''}">
            <span class="turn-arrow">▶</span>
            <span class="init-score">${c.init}</span>
            <span class="init-name">${c.name}</span>
            <span class="init-type">${typeIcons[c.type] || '?'} ${c.type}</span>
            <span class="init-hp">
              ❤️ <input type="number" value="${c.hp}"
                onchange="updateHp(${i}, this.value)"
                style="width:55px; padding:2px 6px; font-size:15px; margin:0; display:inline;"
                title="Current HP" />
              <span style="color:#5a4a30;">/ ${c.maxHp}</span>
            </span>
            <button class="danger" style="padding:5px 10px; font-size:14px;"
              onclick="removeCombatant(${i})">✕</button>
          </div>`;
      }).join('');
    }

  </script>
</body>
</html>
