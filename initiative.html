<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn-uicons.flaticon.com https://fonts.googleapis.com; font-src https://cdn-uicons.flaticon.com https://fonts.gstatic.com; img-src 'self' data: https://www.transparenttextures.com https://*.googleusercontent.com https://avatars.githubusercontent.com; connect-src 'self' https://*.supabase.co https://api.open5e.com https://www.dnd5eapi.co;" />
  <title>DM Companion – Initiative Tracker</title>
  <meta name="description" content="Combat initiative tracker with HP, damage, healing, and condition management." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to content</a>

  <nav id="main-nav" aria-label="Main navigation"></nav>

  <main id="main-content">
    <h1><i class="fi fi-rr-sword"></i> Initiative Tracker</h1>
    <p class="subtitle">Track combat turn order. Never lose your place mid-battle again.</p>

    <!-- ── Combat Controls (primary) ─────────────────────── -->
    <div class="card init-controls-card">
      <div class="init-status-bar">
        <span class="init-status-label">Round</span>
        <strong id="round-counter" class="init-status-val">1</strong>
        <span class="init-status-sep">|</span>
        <span class="init-status-label">Active</span>
        <strong id="turn-counter" class="init-status-val">-</strong>
      </div>
      <div class="row-actions">
        <button class="gold" onclick="nextTurn()"><i class="fi fi-rr-play"></i> Next Turn</button>
        <button onclick="sortByInitiative()"><i class="fi fi-rr-sort-alt"></i> Sort</button>
        <button class="secondary" onclick="resetTurn()"><i class="fi fi-rr-refresh"></i> Reset Round</button>
        <button class="danger" onclick="clearAll()"><i class="fi fi-rr-trash"></i> Clear</button>
      </div>
    </div>

    <!-- ── Initiative List (main content) ─────────────────── -->
    <div class="initiative-list" id="init-list">
      <p class="empty-state">No combatants yet - add them below or import your party.</p>
    </div>

    <!-- ── Add Combatant (secondary) ──────────────────────── -->
    <div class="card init-add-card">
      <div class="init-add-header">
        <h3 style="margin:0; font-size:14px;"><i class="fi fi-rr-plus"></i> Add Combatant</h3>
        <div class="row-actions" style="flex-wrap:wrap;">
          <button class="secondary" style="padding:5px 14px; font-size:12px;" onclick="showImportPicker('players')"><i class="fi fi-rr-download"></i> Import Players</button>
          <button class="secondary" style="padding:5px 14px; font-size:12px;" onclick="showImportPicker('creatures')"><i class="fi fi-rr-download"></i> Import Creatures</button>
        </div>
      </div>

      <div class="stat-grid" style="margin-top:14px;">
        <div>
          <label>Name</label>
          <input type="text" id="new-name" placeholder="e.g. Goblin Chief" />
        </div>
        <div>
          <label>Initiative</label>
          <div style="display:flex; gap:6px; align-items:flex-start;">
            <input type="number" id="new-init" placeholder="e.g. 14" style="flex:1;" />
            <button type="button" onclick="rollInitiative()" style="padding:10px 12px; margin-bottom:16px; white-space:nowrap;" title="Roll d20 for initiative"><i class="fi fi-rr-dice-d20"></i></button>
          </div>
        </div>
        <div>
          <label>HP (optional)</label>
          <input type="number" id="new-hp" placeholder="e.g. 30" />
        </div>
      </div>
      <div class="stat-grid-2">
        <div>
          <label>Type</label>
          <select id="new-type">
            <option value="player"> Player</option>
            <option value="npc"> NPC</option>
            <option value="creature"> Creature</option>
          </select>
        </div>
        <div style="display:flex; align-items:flex-end; padding-bottom:16px;">
          <button onclick="addCombatant()" style="width:100%;">+ Add</button>
        </div>
      </div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'initiative.html';</script>
  <script src="js/lib/supabase.js"></script>
  <script src="js/lib/auth.js"></script>
  <script src="js/lib/app.js"></script>
  <script src="js/pages/initiative.js"></script>
</body>
</html>
