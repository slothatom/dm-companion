<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn-uicons.flaticon.com https://fonts.googleapis.com; font-src https://cdn-uicons.flaticon.com https://fonts.gstatic.com; img-src 'self' data: https: http:; connect-src 'self' https://*.supabase.co https://api.open5e.com https://www.dnd5eapi.co;" />
  <title>DM Companion – Locations</title>
  <meta name="description" content="Manage campaign locations - towns, dungeons, landmarks, and points of interest." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <script>/* theme-init */ (function(){var t=localStorage.getItem("theme");if(t)document.documentElement.dataset.theme=t;})()</script>
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to content</a>

  <nav id="main-nav" aria-label="Main navigation"></nav>

  <main id="main-content">
    <h1><i class="fi fi-rr-marker"></i> Locations</h1>
    <p class="subtitle">Manage locations for your campaigns - towns, dungeons, wilderness, and points of interest.</p>

    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:16px;">
      <select id="location-campaign-filter" onchange="filterLocations()" style="min-width:180px; margin:0;">
        <option value="">All Campaigns</option>
      </select>
      <button onclick="addLocation()"><i class="fi fi-rr-plus"></i> Add Location</button>
      <button onclick="saveLocations()" id="save-btn"><i class="fi fi-rr-disk"></i> Save</button>
      <span class="save-status" id="save-status"></span>
    </div>

    <div id="locations-area" aria-live="polite"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'locations.html';</script>
  <script src="js/lib/supabase.js"></script>
  <script src="js/lib/auth.js"></script>
  <script src="js/lib/app.js"></script>
  <script src="js/pages/locations.js"></script>
</body>
</html>
