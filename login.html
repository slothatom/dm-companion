<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Companion – Sign In</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>

  <div class="auth-container">

    <div class="auth-logo">⚔️</div>
    <h1 class="auth-title">DM Companion</h1>
    <p class="auth-subtitle">Sign in to access your campaigns</p>

    <!-- Social Login -->
    <button class="auth-social" id="btn-google" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48" style="margin-right:10px;vertical-align:middle;">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </button>

    <button class="auth-social" id="btn-github" onclick="signInWithGitHub()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="margin-right:10px;vertical-align:middle;">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
      Continue with GitHub
    </button>

    <div class="auth-divider"><span>or sign in with email</span></div>

    <!-- Email / Password form -->
    <form id="auth-form" onsubmit="handleEmail(event)">
      <label for="auth-email">Email</label>
      <input type="email" id="auth-email" placeholder="you@example.com" required autocomplete="email" />

      <label for="auth-password">Password</label>
      <input type="password" id="auth-password" placeholder="••••••••" required autocomplete="current-password" />

      <div style="text-align:right; margin-top:-4px; margin-bottom:12px;">
        <a href="#" onclick="showForgotPassword(event)" style="font-size:13px; color:var(--text-muted); text-decoration:none;">
          Forgot password?
        </a>
      </div>

      <button type="submit" id="auth-submit">Sign In</button>
    </form>

    <!-- Forgot password view -->
    <div id="forgot-section" style="display:none;">
      <p style="color:var(--text-muted); font-size:14px; margin-bottom:14px; text-align:center;">
        Enter your email and we'll send you a reset link.
      </p>
      <label for="reset-email">Email</label>
      <input type="email" id="reset-email" placeholder="you@example.com" autocomplete="email" />
      <button onclick="sendPasswordReset()" style="margin-top:8px;">Send Reset Link</button>
      <p style="text-align:center; margin-top:12px;">
        <a href="#" onclick="showSignIn(event)" style="font-size:13px; color:var(--text-muted); text-decoration:none;">← Back to sign in</a>
      </p>
    </div>

    <!-- New-password view (shown after clicking reset link in email) -->
    <div id="new-password-section" style="display:none;">
      <p style="color:var(--text-muted); font-size:14px; margin-bottom:14px; text-align:center;">
        Choose a new password for your account.
      </p>
      <label for="new-password">New Password</label>
      <input type="password" id="new-password" placeholder="••••••••" autocomplete="new-password" />
      <button onclick="updatePassword()" style="margin-top:8px;">Set New Password</button>
    </div>

    <p class="auth-error" id="auth-error"></p>
    <p class="auth-toggle" id="auth-toggle">
      Don't have an account? <a href="#" onclick="toggleMode(event)">Sign Up</a>
    </p>

  </div>

  <!-- Supabase SDK (must load before supabase.js) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>

    let isSignUp = false;

    // If already logged in, skip the login page
    (async function () {
      const { data: { session } } = await db.auth.getSession();
      if (session) window.location.href = 'index.html';
    })();

    // Toggle between Sign In and Sign Up
    function toggleMode(e) {
      if (e) e.preventDefault();
      isSignUp = !isSignUp;
      document.getElementById('auth-submit').textContent = isSignUp ? 'Create Account' : 'Sign In';
      document.getElementById('auth-toggle').innerHTML = isSignUp
        ? 'Already have an account? <a href="#" onclick="toggleMode(event)">Sign In</a>'
        : 'Don\'t have an account? <a href="#" onclick="toggleMode(event)">Sign Up</a>';
      document.getElementById('auth-error').textContent = '';
    }

    // Email + Password sign in / sign up
    async function handleEmail(e) {
      e.preventDefault();
      const email    = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('auth-password').value;
      const errorEl  = document.getElementById('auth-error');
      const submitEl = document.getElementById('auth-submit');

      errorEl.textContent   = '';
      submitEl.textContent  = isSignUp ? 'Creating account…' : 'Signing in…';
      submitEl.disabled     = true;

      let result;
      if (isSignUp) {
        result = await db.auth.signUp({ email, password });
        if (!result.error) {
          errorEl.style.color = '#6aaa6a';
          errorEl.textContent = 'Account created! Check your email for a confirmation link.';
          submitEl.textContent = 'Create Account';
          submitEl.disabled    = false;
          return;
        }
      } else {
        result = await db.auth.signInWithPassword({ email, password });
        if (!result.error) {
          window.location.href = 'index.html';
          return;
        }
      }

      errorEl.style.color  = '#c05050';
      errorEl.textContent  = result.error.message;
      submitEl.textContent = isSignUp ? 'Create Account' : 'Sign In';
      submitEl.disabled    = false;
    }

    // OAuth — Google
    async function signInWithGoogle() {
      const { error } = await db.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.href.replace('login.html', 'index.html') }
      });
      if (error) document.getElementById('auth-error').textContent = error.message;
    }

    // OAuth — GitHub
    async function signInWithGitHub() {
      const { error } = await db.auth.signInWithOAuth({
        provider: 'github',
        options: { redirectTo: window.location.href.replace('login.html', 'index.html') }
      });
      if (error) document.getElementById('auth-error').textContent = error.message;
    }

    // ── Forgot password ──────────────────────────────────────

    function showForgotPassword(e) {
      e.preventDefault();
      document.getElementById('auth-form').style.display      = 'none';
      document.getElementById('auth-toggle').style.display    = 'none';
      document.getElementById('forgot-section').style.display = 'block';
      document.getElementById('auth-error').textContent       = '';
      document.getElementById('auth-error').style.color       = '';
    }

    function showSignIn(e) {
      if (e) e.preventDefault();
      document.getElementById('auth-form').style.display              = 'block';
      document.getElementById('auth-toggle').style.display            = 'block';
      document.getElementById('forgot-section').style.display         = 'none';
      document.getElementById('new-password-section').style.display   = 'none';
      document.getElementById('auth-error').textContent               = '';
    }

    async function sendPasswordReset() {
      const email   = (document.getElementById('reset-email').value || '').trim();
      const errorEl = document.getElementById('auth-error');
      if (!email) {
        errorEl.style.color = '#c05050';
        errorEl.textContent = 'Please enter your email address.';
        return;
      }
      const { error } = await db.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + window.location.pathname
      });
      if (error) {
        errorEl.style.color = '#c05050';
        errorEl.textContent = error.message;
      } else {
        errorEl.style.color = '#6aaa6a';
        errorEl.textContent = '✓ Reset link sent — check your email!';
      }
    }

    async function updatePassword() {
      const password = document.getElementById('new-password').value;
      const errorEl  = document.getElementById('auth-error');
      if (!password || password.length < 6) {
        errorEl.style.color = '#c05050';
        errorEl.textContent = 'Password must be at least 6 characters.';
        return;
      }
      const { error } = await db.auth.updateUser({ password });
      if (error) {
        errorEl.style.color = '#c05050';
        errorEl.textContent = error.message;
      } else {
        window.location.href = 'index.html';
      }
    }

    // Show the new-password form when Supabase redirects back with a recovery token
    db.auth.onAuthStateChange(function (event) {
      if (event === 'PASSWORD_RECOVERY') {
        document.getElementById('auth-form').style.display             = 'none';
        document.getElementById('auth-toggle').style.display           = 'none';
        document.getElementById('forgot-section').style.display        = 'none';
        document.getElementById('new-password-section').style.display  = 'block';
        document.getElementById('auth-error').textContent              = '';
      }
    });

  </script>
</body>
</html>
