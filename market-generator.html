<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn-uicons.flaticon.com https://fonts.googleapis.com; font-src https://cdn-uicons.flaticon.com https://fonts.gstatic.com; img-src 'self' data: https://www.transparenttextures.com https://*.googleusercontent.com https://avatars.githubusercontent.com; connect-src 'self' https://*.supabase.co https://api.open5e.com https://www.dnd5eapi.co;" />
  <title>DM Companion – Market Generator</title>
  <meta name="description" content="Random market and shop generator with inventories and shopkeepers." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <script>/* theme-init */ (function(){var t=localStorage.getItem("theme");if(t)document.documentElement.dataset.theme=t;})()</script>
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to content</a>

  <nav id="main-nav" aria-label="Main navigation"></nav>

  <main id="main-content">
    <h1><i class="fi fi-rr-shop"></i> Market Generator</h1>
    <p class="subtitle">Generate random shop inventories - stock a store in seconds.</p>

    <div class="card" style="padding:14px; margin-bottom:16px;">
      <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end;">
        <div>
          <label for="settlement-tier">Settlement</label>
          <select id="settlement-tier" style="margin:0;">
            <option value="village">Village</option>
            <option value="town" selected>Town</option>
            <option value="city">City</option>
            <option value="metropolis">Metropolis</option>
          </select>
        </div>
        <div>
          <label for="shop-type">Shop Type</label>
          <select id="shop-type" style="margin:0;">
            <option value="random">Random</option>
            <option value="General Store">General Store</option>
            <option value="Blacksmith">Blacksmith</option>
            <option value="Alchemist">Alchemist</option>
            <option value="Magic Shop">Magic Shop</option>
            <option value="Tavern">Tavern</option>
            <option value="Jeweler">Jeweler</option>
            <option value="Exotic Goods">Exotic Goods</option>
          </select>
        </div>
        <button onclick="generateShop()"><i class="fi fi-rr-dice-d20"></i> Generate</button>
        <button class="secondary" onclick="copyShop()"><i class="fi fi-rr-copy"></i> Copy</button>
      </div>
    </div>

    <div id="shop-output"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'market-generator.html';</script>
  <script src="js/lib/supabase.js"></script>
  <script src="js/lib/auth.js"></script>
  <script src="js/lib/app.js"></script>
  <script src="js/pages/market-generator.js"></script>
</body>
</html>
