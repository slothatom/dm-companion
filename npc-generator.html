<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Companion – NPC Generator</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>

  <nav id="main-nav"></nav>

  <main>
    <h1>🎭 NPC Generator</h1>
    <p class="subtitle">Need an NPC on the fly? Roll one up in a second.</p>

    <div class="npc-output" id="npc-output">
      <p class="empty-state">Hit "Generate NPC" to bring someone to life.</p>
    </div>

    <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:32px;">
      <button onclick="generateNPC()">🎲 Generate NPC</button>
      <button class="secondary" onclick="saveToCharacters()">💾 Save to Characters</button>
    </div>

    <hr />

    <h2>Generated This Session</h2>
    <div id="generated-list">
      <p class="empty-state">Nothing generated yet.</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'npc-generator.html';</script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/npc-data.js"></script>
  <script>

    let currentNPC    = null;
    let sessionNPCs   = [];
    let currentUserId = null;

    (async function () {
      const user = await requireAuth();
      if (!user) return;
      currentUserId = user.id;
      renderNav(user);
    })();

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function generateNPC() {
      const npc = {
        name:        pick(FIRST_NAMES) + ' ' + pick(LAST_NAMES),
        race:        pick(RACES),
        occupation:  pick(OCCUPATIONS),
        personality: pick(PERSONALITIES),
        quirk:       pick(QUIRKS),
        motivation:  pick(MOTIVATIONS),
      };
      currentNPC = npc;
      renderNPC(npc);
    }

    function renderNPC(npc) {
      const output = document.getElementById('npc-output');
      output.classList.add('has-npc');
      output.innerHTML = `
        <div class="npc-name-display">${npc.name}</div>
        <span class="npc-tag">${npc.race}</span>
        <span class="npc-tag">${npc.occupation}</span>
        <br style="margin-bottom:14px;" />
        <div class="npc-trait-row">
          <span class="npc-trait-label">Personality</span>
          ${npc.personality}
        </div>
        <div class="npc-trait-row">
          <span class="npc-trait-label">Quirk</span>
          ${npc.quirk}
        </div>
        <div class="npc-trait-row">
          <span class="npc-trait-label">Motivation</span>
          ${npc.motivation}
        </div>`;
    }

    async function saveToCharacters() {
      if (!currentNPC) { alert('Generate an NPC first!'); return; }

      const { error } = await db.from('npcs').insert({
        user_id: currentUserId,
        name:    currentNPC.name,
        hp:      '',
        ac:      '',
        notes:   `${currentNPC.race} ${currentNPC.occupation}. ${currentNPC.personality}. ${currentNPC.quirk}. Motivation: ${currentNPC.motivation}`
      });

      if (error) { alert('Save failed: ' + error.message); return; }

      sessionNPCs.push(currentNPC);
      renderSessionList();
      alert(`${currentNPC.name} saved to Characters! 🐉`);
    }

    function renderSessionList() {
      const container = document.getElementById('generated-list');
      if (sessionNPCs.length === 0) {
        container.innerHTML = '<p class="empty-state">Nothing generated yet.</p>';
        return;
      }
      container.innerHTML = sessionNPCs.map(function (npc) {
        return `
          <div class="card" style="padding:14px 18px;">
            <strong style="color:#c9a84c;">${npc.name}</strong>
            <span class="npc-tag" style="margin-left:8px;">${npc.race}</span>
            <span class="npc-tag">${npc.occupation}</span>
            <div style="color:#a89060; font-size:15px; margin-top:6px; font-style:italic;">${npc.personality}</div>
          </div>`;
      }).join('');
    }

  </script>
</body>
</html>
