<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Companion – NPC &amp; Creature Generator</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>

  <nav id="main-nav"></nav>

  <main>
    <h1>🎭 NPC &amp; Creature Generator</h1>
    <p class="subtitle">Instant characters and monsters, ready to drop into any scene.</p>

    <!-- Mode tabs -->
    <div class="gen-type-tabs">
      <button class="gen-tab active-gen-tab" onclick="setGenMode('npc', this)">🎭 NPC</button>
      <button class="gen-tab" onclick="setGenMode('creature', this)">🐉 Creature</button>
    </div>

    <!-- Output panel -->
    <div class="npc-output" id="gen-output">
      <p class="empty-state" id="gen-placeholder">Hit "Generate NPC" to bring someone to life.</p>
    </div>

    <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:32px;">
      <button id="gen-btn" onclick="generate()">🎲 Generate NPC</button>
      <button class="secondary" onclick="copyEntry()">📋 Copy</button>
      <button class="secondary" id="save-chars-btn" onclick="saveToCharacters()">💾 Save to Characters</button>
    </div>

    <hr />

    <h2>🎭 Generated This Session</h2>
    <div id="generated-list">
      <p class="empty-state">Nothing generated yet.</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'npc-generator.html';</script>
  <script src="js/lib/supabase.js"></script>
  <script src="js/lib/auth.js"></script>
  <script src="js/lib/app.js"></script>
  <script src="js/data/npc-data.js"></script>
  <script src="js/pages/generator.js"></script>
</body>
</html>
