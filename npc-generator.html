<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn-uicons.flaticon.com https://fonts.googleapis.com; font-src https://cdn-uicons.flaticon.com https://fonts.gstatic.com; img-src 'self' data: https://www.transparenttextures.com https://*.googleusercontent.com https://avatars.githubusercontent.com; connect-src 'self' https://*.supabase.co https://api.open5e.com https://www.dnd5eapi.co;" />
  <title>DM Companion – NPC &amp; Creature Generator</title>
  <meta name="description" content="Random NPC generator for D&amp;D with names, races, traits, and occupations." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <script>/* theme-init */ (function(){var t=localStorage.getItem("theme");if(t)document.documentElement.dataset.theme=t;})()</script>
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to content</a>

  <nav id="main-nav" aria-label="Main navigation"></nav>

  <main id="main-content">
    <h1><i class="fi fi-rr-magic-wand"></i> NPC &amp; Creature Generator</h1>
    <p class="subtitle">Instant characters and monsters, ready to drop into any scene.</p>

    <!-- Mode tabs -->
    <div class="gen-type-tabs">
      <button class="gen-tab active-gen-tab" onclick="setGenMode('npc', this)"><i class="fi fi-rr-user-speaking"></i> NPC</button>
      <button class="gen-tab" onclick="setGenMode('creature', this)"><i class="fi fi-rr-dragon"></i> Creature</button>
    </div>

    <!-- Output panel -->
    <div class="npc-output" id="gen-output">
      <p class="empty-state" id="gen-placeholder">Hit "Generate NPC" to bring someone to life.</p>
    </div>

    <div class="gen-controls">
      <div class="gen-controls-row">
        <select id="gen-archetype" style="margin:0; min-width:140px;">
          <option value="any">Any Type</option>
          <option value="commoner">Commoner</option>
          <option value="merchant">Merchant / Trader</option>
          <option value="guard">Guard / Military</option>
          <option value="noble">Noble / Official</option>
          <option value="criminal">Criminal / Rogue</option>
          <option value="magic">Magic User</option>
          <option value="adventurer">Adventurer</option>
          <option value="religious">Religious</option>
        </select>
        <button id="gen-btn" onclick="generate()"><i class="fi fi-rr-dice-d20"></i> Generate NPC</button>
      </div>
      <div class="gen-controls-row">
        <button class="secondary" onclick="copyEntry()"><i class="fi fi-rr-copy"></i> Copy</button>
        <button class="secondary" id="save-chars-btn" onclick="saveToCharacters()"><i class="fi fi-rr-disk"></i> Save to Characters</button>
      </div>
      <div class="gen-controls-row">
        <label style="display:flex; align-items:center; gap:6px; cursor:pointer; margin:0; font-size:14px;">
          <input type="checkbox" id="gen-autosave" onchange="toggleAutosave()" />
          Auto-save on generate
        </label>
        <select id="gen-campaign-select" style="margin:0; min-width:160px;">
          <option value="">No Campaign</option>
        </select>
      </div>
    </div>

    <hr />

    <h2><i class="fi fi-rr-magic-wand"></i> Generated This Session <span style="font-size:13px; font-weight:400; color:var(--text-muted);">(this session only - saved entries persist on the Characters page)</span></h2>
    <div id="generated-list">
      <p class="empty-state">Nothing generated yet.</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'npc-generator.html';</script>
  <script src="js/lib/supabase.js"></script>
  <script src="js/lib/auth.js"></script>
  <script src="js/lib/app.js"></script>
  <script src="js/data/npc-data.js"></script>
  <script src="js/pages/generator.js"></script>
</body>
</html>
