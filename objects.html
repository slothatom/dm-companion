<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn-uicons.flaticon.com https://fonts.googleapis.com; font-src https://cdn-uicons.flaticon.com https://fonts.gstatic.com; img-src 'self' data: https://www.transparenttextures.com https://*.googleusercontent.com https://avatars.githubusercontent.com; connect-src 'self' https://*.supabase.co https://api.open5e.com https://www.dnd5eapi.co;" />
  <title>DM Companion – Objects</title>
  <meta name="description" content="D&amp;D 5e objects reference with AC and hit points." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <script>/* theme-init */ (function(){var t=localStorage.getItem("theme");if(t)document.documentElement.dataset.theme=t;})()</script>
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to content</a>

  <nav id="main-nav" aria-label="Main navigation"></nav>

  <main id="main-content">
    <h1><i class="fi fi-rr-box"></i> Objects</h1>
    <p class="subtitle">Object statistics - AC, hit points, and damage thresholds for common objects.</p>

    <div class="spell-search">
      <input type="text" id="object-search" placeholder="Search objects..." aria-label="Search objects"
        oninput="renderObjects()" style="margin-bottom:10px;" />
    </div>
    <div class="spell-filters" id="obj-cat-filters" style="margin-bottom:16px;">
      <button class="filter-btn active-filter" onclick="setObjCat('all', this)">All</button>
      <button class="filter-btn" onclick="setObjCat('container', this)">Containers</button>
      <button class="filter-btn" onclick="setObjCat('structure', this)">Structures</button>
      <button class="filter-btn" onclick="setObjCat('furniture', this)">Furniture</button>
      <button class="filter-btn" onclick="setObjCat('armor', this)">Armor &amp; Shields</button>
    </div>

    <div id="objects-content"></div>

    <hr />
    <h2><i class="fi fi-rr-dice-d20"></i> Random Object Generator</h2>
    <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:16px;">
      <select id="obj-gen-cat" style="margin:0;">
        <option value="any">Any Category</option>
        <option value="container">Container</option>
        <option value="structure">Structure</option>
        <option value="furniture">Furniture</option>
        <option value="armor">Armor &amp; Shield</option>
      </select>
      <select id="obj-gen-material" style="margin:0;">
        <option value="any">Any Material</option>
        <option value="Wood">Wood</option>
        <option value="Stone">Stone</option>
        <option value="Iron">Iron / Steel</option>
        <option value="Glass">Glass</option>
      </select>
      <button onclick="generateRandomObject()"><i class="fi fi-rr-dice-d20"></i> Generate</button>
    </div>
    <div id="obj-gen-output"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'objects.html';</script>
  <script src="js/lib/supabase.js"></script>
  <script src="js/lib/auth.js"></script>
  <script src="js/lib/app.js"></script>
  <script src="js/pages/objects.js"></script>
</body>
</html>
