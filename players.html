<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Companion – Players</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>

  <nav id="main-nav"></nav>

  <main>
    <h1>🧙 Players</h1>
    <p class="subtitle">Keep track of your adventuring party.</p>

    <div id="player-list"></div>

    <button onclick="addPlayer()">+ Add Player</button>

    <br /><br />
    <button onclick="savePlayers()">💾 Save All</button>
    <span id="save-status">Saved!</span>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'players.html';</script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>

    let players = [];
    let currentUserId = null;

    (async function () {
      const user = await requireAuth();
      if (!user) return;
      currentUserId = user.id;
      renderNav(user);
      await loadPlayers();
    })();

    async function loadPlayers() {
      const { data } = await db
        .from('players')
        .select('*')
        .eq('user_id', currentUserId)
        .order('created_at');

      players = (data || []).map(function (r) {
        return {
          playerName: r.player_name,
          charName:   r.char_name,
          charClass:  r.char_class,
          race:       r.race,
          level:      r.level,
          hp:         r.hp,
          notes:      r.notes
        };
      });
      renderPlayers();
    }

    function renderPlayers() {
      const container = document.getElementById('player-list');
      container.innerHTML = players.length === 0
        ? '<p class="empty-state">No players yet. Add your party!</p>'
        : players.map(function (p, i) { return buildPlayerCard(p, i); }).join('');
    }

    function buildPlayerCard(player, index) {
      return `
        <div class="card">
          <div class="stat-grid">
            <div>
              <label>Player Name</label>
              <input type="text" value="${player.playerName || ''}"
                onchange="updatePlayer(${index}, 'playerName', this.value)"
                placeholder="e.g. Sarah" />
            </div>
            <div>
              <label>Character Name</label>
              <input type="text" value="${player.charName || ''}"
                onchange="updatePlayer(${index}, 'charName', this.value)"
                placeholder="e.g. Aria Swiftblade" />
            </div>
            <div>
              <label>Class</label>
              <input type="text" value="${player.charClass || ''}"
                onchange="updatePlayer(${index}, 'charClass', this.value)"
                placeholder="e.g. Rogue" />
            </div>
          </div>
          <div class="stat-grid">
            <div>
              <label>Race</label>
              <input type="text" value="${player.race || ''}"
                onchange="updatePlayer(${index}, 'race', this.value)"
                placeholder="e.g. Half-Elf" />
            </div>
            <div>
              <label>Level</label>
              <input type="number" value="${player.level || ''}"
                onchange="updatePlayer(${index}, 'level', this.value)"
                placeholder="e.g. 5" />
            </div>
            <div>
              <label>HP</label>
              <input type="number" value="${player.hp || ''}"
                onchange="updatePlayer(${index}, 'hp', this.value)"
                placeholder="e.g. 38" />
            </div>
          </div>
          <label>Notes (backstory hooks, personality, things to keep in mind)</label>
          <textarea
            onchange="updatePlayer(${index}, 'notes', this.value)"
            placeholder="e.g. Looking for her missing brother. Doesn't trust clerics."
            style="min-height: 80px;"
          >${player.notes || ''}</textarea>
          <button class="danger" onclick="removePlayer(${index})">🗑 Remove</button>
        </div>`;
    }

    function addPlayer() {
      players.push({ playerName: '', charName: '', charClass: '', race: '', level: '', hp: '', notes: '' });
      renderPlayers();
    }

    function updatePlayer(index, field, value) {
      players[index][field] = value;
    }

    function removePlayer(index) {
      players.splice(index, 1);
      renderPlayers();
    }

    async function savePlayers() {
      const { error: delError } = await db
        .from('players')
        .delete()
        .eq('user_id', currentUserId);

      if (delError) { alert('Save failed: ' + delError.message); return; }

      if (players.length > 0) {
        const { error: insError } = await db.from('players').insert(
          players.map(function (p) {
            return {
              user_id:     currentUserId,
              player_name: p.playerName,
              char_name:   p.charName,
              char_class:  p.charClass,
              race:        p.race,
              level:       p.level,
              hp:          p.hp,
              notes:       p.notes
            };
          })
        );
        if (insError) { alert('Save failed: ' + insError.message); return; }
      }

      showSaved();
    }

  </script>
</body>
</html>
