<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn-uicons.flaticon.com https://fonts.googleapis.com; font-src https://cdn-uicons.flaticon.com https://fonts.gstatic.com; img-src 'self' data: https://www.transparenttextures.com https://*.googleusercontent.com https://avatars.githubusercontent.com; connect-src 'self' https://*.supabase.co https://api.open5e.com https://www.dnd5eapi.co;" />
  <title>DM Companion – Players</title>
  <meta name="description" content="Track your party - player characters, stats, spell slots, and campaign assignments." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to content</a>

  <nav id="main-nav" aria-label="Main navigation"></nav>

  <main id="main-content">
    <h1><i class="fi fi-rr-users"></i> Players</h1>
    <p class="subtitle">Keep track of your adventuring party.</p>

    <div class="notes-campaign-bar" id="player-campaign-bar" style="display:none;">
      <div class="campaign-select-wrap">
        <label for="player-campaign-select">Campaign</label>
        <select id="player-campaign-select" onchange="filterByCampaign()">
          <option value="">All Players</option>
        </select>
      </div>
    </div>

    <div id="player-list"><p class="loading-state"><span class="spinner"></span> Loading…</p></div>

    <button onclick="addPlayer()">+ Add Player</button>

    <br /><br />
    <button id="save-btn" onclick="savePlayers()"><i class="fi fi-rr-disk"></i> Save All</button>
    <span id="save-status" class="save-status"></span>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'players.html';</script>
  <script src="js/lib/supabase.js"></script>
  <script src="js/lib/auth.js"></script>
  <script src="js/lib/app.js"></script>
  <script src="js/pages/players.js"></script>
</body>
</html>
