<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn-uicons.flaticon.com https://fonts.googleapis.com; font-src https://cdn-uicons.flaticon.com https://fonts.gstatic.com; img-src 'self' data: https://www.transparenttextures.com https://*.googleusercontent.com https://avatars.githubusercontent.com; connect-src 'self' https://*.supabase.co https://api.open5e.com https://www.dnd5eapi.co;" />
  <title>DM Companion – Quick Reference</title>
  <meta name="description" content="D&amp;D 5e quick reference tables and charts." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css" />

</head>
<body>

  <a href="#main-content" class="skip-link">Skip to content</a>

  <nav id="main-nav" aria-label="Main navigation"></nav>

  <main id="main-content">
    <h1><i class="fi fi-rr-clipboard-list"></i> Quick Reference</h1>
    <p class="subtitle">Conditions, combat actions, cover, and skills - everything mid-session demands at a glance.</p>

    <div class="spell-search">
      <input type="text" id="ref-search" placeholder="Search reference..." aria-label="Search reference"
        oninput="filterRef()" style="margin-bottom:10px;" />
    </div>

    <div class="spell-filters" id="cat-filters">
      <button class="filter-btn active-filter" onclick="setCat('all', this)">All</button>
      <button class="filter-btn" onclick="setCat('condition', this)"><i class="fi fi-rr-bolt"></i> Conditions</button>
      <button class="filter-btn" onclick="setCat('action', this)"><i class="fi fi-rr-sword"></i> Actions</button>
      <button class="filter-btn" onclick="setCat('cover', this)"><i class="fi fi-rr-shield"></i> Cover</button>
      <button class="filter-btn" onclick="setCat('skill', this)"><i class="fi fi-rr-target"></i> Skills</button>
    </div>

    <div id="ref-list"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'quick-ref.html';</script>
  <script src="js/lib/supabase.js"></script>
  <script src="js/lib/auth.js"></script>
  <script src="js/lib/app.js"></script>
  <script src="js/pages/reference.js"></script>
</body>
</html>
