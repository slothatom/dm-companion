<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Companion – Quick Reference</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>

  <nav id="main-nav"></nav>

  <main>
    <h1>📋 Quick Reference</h1>
    <p class="subtitle">Conditions, combat actions, cover, and skills — everything mid-session demands at a glance.</p>

    <div class="spell-search">
      <input type="text" id="ref-search" placeholder="🔍 Search reference..."
        oninput="filterRef()" style="margin-bottom:10px;" />
    </div>

    <div class="spell-filters" id="cat-filters">
      <button class="filter-btn active-filter" onclick="setCat('all', this)">All</button>
      <button class="filter-btn" onclick="setCat('condition', this)">⚡ Conditions</button>
      <button class="filter-btn" onclick="setCat('action', this)">⚔️ Actions</button>
      <button class="filter-btn" onclick="setCat('cover', this)">🛡 Cover</button>
      <button class="filter-btn" onclick="setCat('skill', this)">🎯 Skills</button>
    </div>

    <div id="ref-list"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'quick-ref.html';</script>
  <script src="js/lib/supabase.js"></script>
  <script src="js/lib/auth.js"></script>
  <script src="js/lib/app.js"></script>
  <script src="js/pages/reference.js"></script>
</body>
</html>
