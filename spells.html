<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Companion – Spell Reference</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav id="main-nav"></nav>

  <main>
    <h1>📖 Spell Reference</h1>
    <p class="subtitle">Quick lookup for the most common D&D 5e spells. Search by name or filter by level.</p>

    <div class="spell-search">
      <input type="text" id="spell-search" placeholder="🔍 Search spells..."
        oninput="filterSpells()" style="margin-bottom: 10px;" />
    </div>

    <div class="spell-filters" id="level-filters">
      <button class="filter-btn active-filter" onclick="setLevel('all', this)">All</button>
      <button class="filter-btn" onclick="setLevel('cantrip', this)">Cantrips</button>
      <button class="filter-btn" onclick="setLevel('1', this)">Level 1</button>
      <button class="filter-btn" onclick="setLevel('2', this)">Level 2</button>
      <button class="filter-btn" onclick="setLevel('3', this)">Level 3</button>
      <button class="filter-btn" onclick="setLevel('4', this)">Level 4</button>
      <button class="filter-btn" onclick="setLevel('5', this)">Level 5</button>
    </div>
    <div class="spell-filters" style="margin-top:8px;">
      <button class="filter-btn" id="filter-conc"   onclick="toggleFilter('conc',   this)">🔵 Concentration</button>
      <button class="filter-btn" id="filter-ritual" onclick="toggleFilter('ritual', this)">📿 Ritual</button>
    </div>

    <div id="spell-list"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'spells.html';</script>
  <script src="js/lib/supabase.js"></script>
  <script src="js/lib/auth.js"></script>
  <script src="js/lib/app.js"></script>
  <script src="js/data/spells-data.js"></script>
  <script src="js/pages/spells.js"></script>
</body>
</html>
