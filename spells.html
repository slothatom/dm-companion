<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Companion – Spell Reference</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav id="main-nav"></nav>

  <main>
    <h1>📖 Spell Reference</h1>
    <p class="subtitle">Quick lookup for the most common D&D 5e spells. Search by name or filter by level.</p>

    <div class="spell-search">
      <input type="text" id="spell-search" placeholder="🔍 Search spells..."
        oninput="filterSpells()" style="margin-bottom: 10px;" />
    </div>

    <div class="spell-filters" id="level-filters">
      <button class="filter-btn active-filter" onclick="setLevel('all', this)">All</button>
      <button class="filter-btn" onclick="setLevel('cantrip', this)">Cantrips</button>
      <button class="filter-btn" onclick="setLevel('1', this)">Level 1</button>
      <button class="filter-btn" onclick="setLevel('2', this)">Level 2</button>
      <button class="filter-btn" onclick="setLevel('3', this)">Level 3</button>
      <button class="filter-btn" onclick="setLevel('4', this)">Level 4</button>
      <button class="filter-btn" onclick="setLevel('5', this)">Level 5</button>
    </div>

    <div id="spell-list"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'spells.html';</script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/spells-data.js"></script>
  <script>

    let activeLevel = 'all';

    (async function () {
      const user = await requireAuth();
      if (!user) return;
      renderNav(user);
      renderSpells(SPELLS);
    })();

    function renderSpells(list) {
      const container = document.getElementById('spell-list');
      if (list.length === 0) {
        container.innerHTML = '<p class="empty-state">No spells match your search.</p>';
        return;
      }
      container.innerHTML = list.map(function (s) {
        const levelLabel = s.level === 'cantrip' ? 'Cantrip' : `Level ${s.level}`;
        return `
          <div class="spell-card">
            <div class="spell-header">
              <span class="spell-name">${s.name}</span>
              <span class="spell-level">${levelLabel}</span>
              <span class="spell-school">${s.school}</span>
            </div>
            <div class="spell-stats">
              <span class="spell-stat">⏱ <span>${s.cast}</span></span>
              <span class="spell-stat">📍 <span>${s.range}</span></span>
              <span class="spell-stat">⏳ <span>${s.duration}</span></span>
            </div>
            <div class="spell-desc">${s.desc}</div>
          </div>`;
      }).join('');
    }

    function setLevel(level, btn) {
      activeLevel = level;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter'));
      btn.classList.add('active-filter');
      filterSpells();
    }

    function filterSpells() {
      const query = document.getElementById('spell-search').value.toLowerCase();
      const filtered = SPELLS.filter(function (s) {
        const matchesLevel  = activeLevel === 'all' || s.level === activeLevel;
        const matchesSearch = s.name.toLowerCase().includes(query) ||
                              s.desc.toLowerCase().includes(query) ||
                              s.school.toLowerCase().includes(query);
        return matchesLevel && matchesSearch;
      });
      renderSpells(filtered);
    }

  </script>
</body>
</html>
