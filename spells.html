<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Companion – Spell Reference</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css" />
</head>
<body>

  <nav id="main-nav"></nav>

  <main>
    <h1><i class="fi fi-rr-book-spells"></i> Spell Reference</h1>
    <p class="subtitle">Full SRD spell reference — 319 spells. Search by name, school, or filter by level.</p>

    <div class="spell-search">
      <input type="text" id="spell-search" placeholder="Search spells..."
        oninput="filterSpells()" style="margin-bottom: 10px;" />
    </div>

    <div class="spell-filters" id="level-filters">
      <button class="filter-btn active-filter" onclick="setLevel('all', this)">All</button>
      <button class="filter-btn" onclick="setLevel(0, this)">Cantrips</button>
      <button class="filter-btn" onclick="setLevel(1, this)">1</button>
      <button class="filter-btn" onclick="setLevel(2, this)">2</button>
      <button class="filter-btn" onclick="setLevel(3, this)">3</button>
      <button class="filter-btn" onclick="setLevel(4, this)">4</button>
      <button class="filter-btn" onclick="setLevel(5, this)">5</button>
      <button class="filter-btn" onclick="setLevel(6, this)">6</button>
      <button class="filter-btn" onclick="setLevel(7, this)">7</button>
      <button class="filter-btn" onclick="setLevel(8, this)">8</button>
      <button class="filter-btn" onclick="setLevel(9, this)">9</button>
    </div>
    <div class="spell-filters" style="margin-top:8px;">
      <button class="filter-btn" id="filter-conc"   onclick="toggleFilter('conc',   this)"><i class="fi fi-rr-bullseye"></i> Concentration</button>
      <button class="filter-btn" id="filter-ritual" onclick="toggleFilter('ritual', this)"><i class="fi fi-rr-star"></i> Ritual</button>
    </div>
    <div class="spell-filters" id="class-filters" style="margin-top:8px;">
      <button class="filter-btn active-filter" onclick="setClass('all', this)">All Classes</button>
      <button class="filter-btn" onclick="setClass('Bard', this)">Bard</button>
      <button class="filter-btn" onclick="setClass('Cleric', this)">Cleric</button>
      <button class="filter-btn" onclick="setClass('Druid', this)">Druid</button>
      <button class="filter-btn" onclick="setClass('Paladin', this)">Paladin</button>
      <button class="filter-btn" onclick="setClass('Ranger', this)">Ranger</button>
      <button class="filter-btn" onclick="setClass('Sorcerer', this)">Sorcerer</button>
      <button class="filter-btn" onclick="setClass('Warlock', this)">Warlock</button>
      <button class="filter-btn" onclick="setClass('Wizard', this)">Wizard</button>
    </div>

    <div id="spell-list"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'spells.html';</script>
  <script src="js/lib/supabase.js"></script>
  <script src="js/lib/auth.js"></script>
  <script src="js/lib/app.js"></script>
  <script src="js/data/spells-data.js"></script>
  <script src="js/data/spell-classes.js"></script>
  <script src="js/pages/spells.js"></script>
</body>
</html>
