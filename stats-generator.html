<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Companion – Stats Generator</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>

  <nav id="main-nav"></nav>

  <main>
    <h1><i class="fi fi-rr-dice-d20"></i> Stats Generator</h1>
    <p class="subtitle">Generate ability scores - roll 4d6 drop lowest, use standard array, or point buy.</p>

    <div class="gen-type-tabs">
      <button class="method-btn" data-method="4d6" onclick="setMethod('4d6')">4d6 Drop Lowest</button>
      <button class="method-btn" data-method="standard" onclick="setMethod('standard')">Standard Array</button>
      <button class="method-btn" data-method="pointbuy" onclick="setMethod('pointbuy')">Point Buy</button>
    </div>

    <div class="row-actions" style="margin-top:12px;">
      <button id="reroll-btn" style="display:none;" onclick="rerollScores()"><i class="fi fi-rr-dice-d20"></i> Reroll</button>
      <button class="secondary" onclick="copyScores()"><i class="fi fi-rr-copy"></i> Copy</button>
    </div>

    <div id="scores-output"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'stats-generator.html';</script>
  <script src="js/lib/supabase.js"></script>
  <script src="js/lib/auth.js"></script>
  <script src="js/lib/app.js"></script>
  <script src="js/pages/stats-generator.js"></script>
</body>
</html>
