<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn-uicons.flaticon.com https://fonts.googleapis.com; font-src https://cdn-uicons.flaticon.com https://fonts.gstatic.com; img-src 'self' data: https://www.transparenttextures.com https://*.googleusercontent.com https://avatars.githubusercontent.com; connect-src 'self' https://*.supabase.co https://api.open5e.com https://www.dnd5eapi.co;" />
  <title>DM Companion – Stats Generator</title>
  <meta name="description" content="D&amp;D ability score generator - standard array, 4d6 drop lowest, and point buy." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <script>/* theme-init */ (function(){var t=localStorage.getItem("theme");if(t)document.documentElement.dataset.theme=t;})()</script>
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to content</a>

  <nav id="main-nav" aria-label="Main navigation"></nav>

  <main id="main-content">
    <h1><i class="fi fi-rr-dice-d20"></i> Stats Generator</h1>
    <p class="subtitle">Generate ability scores - roll 4d6 drop lowest, use standard array, or point buy.</p>

    <div class="gen-type-tabs">
      <button class="method-btn" data-method="4d6" onclick="setMethod('4d6')">4d6 Drop Lowest</button>
      <button class="method-btn" data-method="standard" onclick="setMethod('standard')">Standard Array</button>
      <button class="method-btn" data-method="pointbuy" onclick="setMethod('pointbuy')">Point Buy</button>
    </div>

    <div class="row-actions" style="margin-top:12px;">
      <button id="reroll-btn" style="display:none;" onclick="rerollScores()"><i class="fi fi-rr-dice-d20"></i> Reroll</button>
      <button class="secondary" onclick="copyScores()"><i class="fi fi-rr-copy"></i> Copy</button>
    </div>

    <div id="scores-output"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'stats-generator.html';</script>
  <script src="js/lib/supabase.js"></script>
  <script src="js/lib/auth.js"></script>
  <script src="js/lib/app.js"></script>
  <script src="js/pages/stats-generator.js"></script>
</body>
</html>
