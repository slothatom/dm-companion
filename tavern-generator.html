<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn-uicons.flaticon.com https://fonts.googleapis.com; font-src https://cdn-uicons.flaticon.com https://fonts.gstatic.com; img-src 'self' data: https://www.transparenttextures.com https://*.googleusercontent.com https://avatars.githubusercontent.com; connect-src 'self' https://*.supabase.co https://api.open5e.com https://www.dnd5eapi.co;" />
  <title>DM Companion - Tavern Generator</title>
  <meta name="description" content="Random tavern generator with menus, rooms, quirks, and atmosphere." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <script>/* theme-init */ (function(){var t=localStorage.getItem("theme");if(t)document.documentElement.dataset.theme=t;})()</script>
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to content</a>

  <nav id="main-nav" aria-label="Main navigation"></nav>

  <main id="main-content">
    <h1><i class="fi fi-rr-mug-hot-alt"></i> Tavern Generator</h1>
    <p class="subtitle">Generate a full tavern with name, atmosphere, menu, drinks, and sleeping options.</p>

    <div class="card" style="padding:14px;">
      <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
        <div>
          <label for="tavern-quality">Quality</label>
          <select id="tavern-quality" style="margin:0;">
            <option value="squalid">Squalid</option>
            <option value="poor">Poor</option>
            <option value="modest" selected>Modest</option>
            <option value="comfortable">Comfortable</option>
            <option value="wealthy">Wealthy</option>
            <option value="aristocratic">Aristocratic</option>
          </select>
        </div>
        <button onclick="generateTavern()"><i class="fi fi-rr-dice-d20"></i> Generate Tavern</button>
        <button class="secondary" onclick="copyTavern()"><i class="fi fi-rr-copy"></i> Copy</button>
      </div>
    </div>

    <div id="tavern-output"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>window.ACTIVE_PAGE = 'tavern-generator.html';</script>
  <script src="js/lib/supabase.js"></script>
  <script src="js/lib/auth.js"></script>
  <script src="js/lib/app.js"></script>
  <script src="js/pages/tavern-generator.js"></script>
</body>
</html>
